<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Result</title>
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">Go ASCII Art</a>
        </div>
    </nav>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">🌙</button>

    <main class="main-container">
        <div class="result-container">
            <h1 class="hero-title">Generated Art</h1>

            <pre class="ascii-output" id="ascii-output">{{.Result}}</pre>

            <div class="action-buttons">
                <button class="btn-secondary" id="copy-btn">Copy to Clipboard</button>
                <a href="/" class="btn-secondary">Create New</a>
            </div>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('ascii-output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
            });
        });
    </script>
</body>
</html>
